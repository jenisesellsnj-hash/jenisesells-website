name: API

on:
  push:
    branches: [feat/cma-pipeline-impl]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'

jobs:
  build-and-test:
    name: "API — build and test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore apps/api/RealEstateStar.Api.sln

      - name: Build
        run: dotnet build apps/api/RealEstateStar.Api.sln --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test apps/api/RealEstateStar.Api.sln
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory apps/api/coverage
          --logger "console;verbosity=minimal"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/**/coverage.cobertura.xml
          retention-days: 7
